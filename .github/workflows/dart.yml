name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pauselock-server

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Analyze project source
        run: dart analyze

      - name: Run tests
        run: dart test

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pauselock-app

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test

  deploy:
    name: Deploy to Debian Trixie Server
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Execute SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Debian Trixie non-interactive SSH often misses user PATHs. 
            # Source profile to ensure flutter/dart commands are available.
            source ~/.profile || true
            source ~/.bashrc || true

            cd /opt/pauselock
            find .git/objects -type f -size 0 -delete 2>/dev/null || true
            git fetch --all --force
            git reset --hard origin/main
            
            # Build Backend
            cd pauselock-server
            dart pub get
            dart compile exe bin/server.dart -o pauselock_server
            sudo systemctl restart pauselock
            
            # Build Frontend
            cd ../pauselock-app
            flutter pub get
            flutter build web --release
            
            # Deploy statically to Nginx
            sudo cp -r build/web/* /var/www/pauselock/

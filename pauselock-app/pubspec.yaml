name: pauselock_app
description: Pauselock - Deadlock Stats Tracker
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  serverpod_flutter: ^3.4.8
  serverpod_auth_shared_flutter: ^3.4.8
  serverpod_client: ^3.4.8
  http: ^1.1.0
  shared_preferences: ^2.2.0
  cached_network_image: ^3.3.0
  go_router: ^13.0.0
  glassmorphism: ^3.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.0.0
  intl: ^0.19.0
  flutter_markdown: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

name: pauselock_server
description: Serverpod backend for Pauselock.
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  serverpod: ^3.4.8
  serverpod_auth_server: ^3.4.8
  serverpod_shared: ^3.4.8
  json_annotation: ^4.8.1
  http: ^1.1.0
  crypto: ^3.0.3
  logging: ^1.2.0

dev_dependencies:
  build_runner: ^2.4.0
  json_serializable: ^6.7.1
  test: ^1.24.0

executables:
  serverpod_pauselock:
    main: lib/server.dart
